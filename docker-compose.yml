services:
  wait_init:
    image: alpine:3.20
    container_name: wait_init
    environment:
      - WAIT_INIT_DELAY_SECONDS=${WAIT_INIT_DELAY_SECONDS:-30}
      - WAIT_INIT_TIMEOUT_SECONDS=${WAIT_INIT_TIMEOUT_SECONDS:-180}
      - WAIT_INIT_POLL_INTERVAL_SECONDS=${WAIT_INIT_POLL_INTERVAL_SECONDS:-5}
    volumes:
      - ./wait-init/wait-init.sh:/usr/local/bin/wait-init.sh:ro
      - /usr/share/vulkan/icd.d:/host/usr/share/vulkan/icd.d:ro
      - /usr/share/glvnd/egl_vendor.d:/host/usr/share/glvnd/egl_vendor.d:ro
      - /dev:/host/dev:ro
    command: ["/bin/sh", "/usr/local/bin/wait-init.sh"]
    restart: "no"

  lmstudio:
    image: vuyoyo/lmstudio-guacamole:latest
    container_name: lmstudio
    depends_on:
      wait_init:
        condition: service_completed_successfully
    command: ["/bin/bash", "/app/entrypoint.sh"]
    runtime: nvidia
    gpus: all
    privileged: true
    environment:
      - ENABLE_GPU_RENDERING=${ENABLE_GPU_RENDERING:-true}
      - FORCE_UPDATE=${FORCE_UPDATE:-false}
      - SKIP_REMOTE_VERSION_CHECK=${SKIP_REMOTE_VERSION_CHECK:-false}
      - UPDATE_CHECK_MAX_TIME=${UPDATE_CHECK_MAX_TIME:-8}
      - AUTO_LOAD_MODEL=${AUTO_LOAD_MODEL:-false}
      - CLEAN_LM_VENDOR_CACHE=${CLEAN_LM_VENDOR_CACHE:-false}
      - ENABLE_GUAC_WEB=${ENABLE_GUAC_WEB:-true} #For debug only
      - GUAC_WEB_PORT=${GUAC_WEB_PORT:-8888}
      - GUAC_USERNAME=${GUAC_USERNAME:-lmstudio}
      - GUAC_PASSWORD=${GUAC_PASSWORD:-lmstudio}
      - GUAC_CONN_NAME=${GUAC_CONN_NAME:-LM Studio Shared Desktop}
      - GUAC_PROTOCOL=${GUAC_PROTOCOL:-vnc}
      - GUAC_TARGET_HOST=${GUAC_TARGET_HOST:-lmstudio}
      - GUAC_TARGET_PORT=${GUAC_TARGET_PORT:-5900}
      - GUAC_TARGET_PASSWORD=${GUAC_TARGET_PASSWORD:-lmstudio}
      - GUAC_AUTORETRY=${GUAC_AUTORETRY:-3}
      - GUAC_DISABLE_DISPLAY_RESIZE=${GUAC_DISABLE_DISPLAY_RESIZE:-false}
      - GUAC_COLOR_DEPTH=${GUAC_COLOR_DEPTH:-24}
      - GUAC_CURSOR=${GUAC_CURSOR:-remote}
      - GUAC_DISABLE_COPY=${GUAC_DISABLE_COPY:-false}
      - GUAC_DISABLE_PASTE=${GUAC_DISABLE_PASTE:-false}
      - GUAC_CLIPBOARD_ENCODING=${GUAC_CLIPBOARD_ENCODING:-UTF-8}
      - LM_STUDIO_DOWNLOAD_URL=${LM_STUDIO_DOWNLOAD_URL:-}
      - LM_STUDIO_DOWNLOAD_RETRIES=${LM_STUDIO_DOWNLOAD_RETRIES:-3}
      - LM_STUDIO_DOWNLOAD_TIMEOUT=${LM_STUDIO_DOWNLOAD_TIMEOUT:-30}
      - AUTO_INSTALL_GPU_BACKENDS=${AUTO_INSTALL_GPU_BACKENDS:-true}
      - RUNTIME_ENGINE_FAMILY=${RUNTIME_ENGINE_FAMILY:-llama.cpp}
      - PREFERRED_GPU_BACKEND=${PREFERRED_GPU_BACKEND:-cuda}
      - FALLBACK_GPU_BACKEND=${FALLBACK_GPU_BACKEND:-vulkan}
      - LMS_BACKEND_SETUP_TIMEOUT=${LMS_BACKEND_SETUP_TIMEOUT:-240}
      - LMS_BACKEND_SELECT_RETRIES=${LMS_BACKEND_SELECT_RETRIES:-1}
      - LMS_BACKEND_AUTOCONFIG_STAMP=${LMS_BACKEND_AUTOCONFIG_STAMP:-/root/.cache/lm-studio/.internal/.backend-autoconfig-done}
      - ENABLE_MULTI_CLIENT_1080P_LOCK=${ENABLE_MULTI_CLIENT_1080P_LOCK:-true}
      - MULTI_CLIENT_RESOLUTION=${MULTI_CLIENT_RESOLUTION:-1920x1080}
      - RESOLUTION_MONITOR_INTERVAL=${RESOLUTION_MONITOR_INTERVAL:-2}
      - ENABLE_SINGLE_CLIENT_DYNAMIC_RESOLUTION=${ENABLE_SINGLE_CLIENT_DYNAMIC_RESOLUTION:-true}
      - SINGLE_CLIENT_RESOLUTION_HINT=${SINGLE_CLIENT_RESOLUTION_HINT:-}
      - DESKTOP_SYNC_INTERVAL=${DESKTOP_SYNC_INTERVAL:-20}
      - LM_ENSURE_RUNNING=${LM_ENSURE_RUNNING:-true}
      - LM_RESTART_INTERVAL=${LM_RESTART_INTERVAL:-2}
      - LM_ENSURE_WINDOW=${LM_ENSURE_WINDOW:-false}
      - LM_WINDOW_MISSING_TICKS=${LM_WINDOW_MISSING_TICKS:-3}
      - LM_WINDOW_GRACE_SECONDS=${LM_WINDOW_GRACE_SECONDS:-20}
      - LM_WATCHDOG_DEBUG=${LM_WATCHDOG_DEBUG:-false} #For debug only
      - ENABLE_CLIPBOARD_SYNC=${ENABLE_CLIPBOARD_SYNC:-true} #For debug only
      - CLIPBOARD_AUTOCUTSEL_ENABLE=${CLIPBOARD_AUTOCUTSEL_ENABLE:-false} #For debug only
      - CLIPBOARD_GUARDIAN_ENABLE=${CLIPBOARD_GUARDIAN_ENABLE:-false} #For debug only
      - CLIPBOARD_GUARDIAN_INTERVAL=${CLIPBOARD_GUARDIAN_INTERVAL:-1} #For debug only
      - CLIPBOARD_FAKE_KEYBOARD_ENABLE=${CLIPBOARD_FAKE_KEYBOARD_ENABLE:-false}
      - CLIPBOARD_MAX_TYPE_CHARS=${CLIPBOARD_MAX_TYPE_CHARS:-8192}
      - CLIPBOARD_BRIDGE_ENABLE=${CLIPBOARD_BRIDGE_ENABLE:-true}
      - CLIPBOARD_BRIDGE_PORT=${CLIPBOARD_BRIDGE_PORT:-18080}
      - DESKTOP_LANGUAGE=${DESKTOP_LANGUAGE:-ENG}
      - XVFB_MAX_RESOLUTION=${XVFB_MAX_RESOLUTION:-4096x2160}
      - XVFB_STARTUP_TIMEOUT=${XVFB_STARTUP_TIMEOUT:-20}
      - XVFB_ENSURE_RUNNING=${XVFB_ENSURE_RUNNING:-true}
      - XVFB_RESTART_INTERVAL=${XVFB_RESTART_INTERVAL:-2}
      - X11VNC_DISABLE_XFIXES=${X11VNC_DISABLE_XFIXES:-true}
      - X11VNC_ENSURE_RUNNING=${X11VNC_ENSURE_RUNNING:-true}
      - X11VNC_RESTART_INTERVAL=${X11VNC_RESTART_INTERVAL:-2}
      - XFCE_ENSURE_COMPONENTS=${XFCE_ENSURE_COMPONENTS:-true}
      - XFCE_COMPONENT_CHECK_INTERVAL=${XFCE_COMPONENT_CHECK_INTERVAL:-5}
      - XFWM_USE_REPLACE=${XFWM_USE_REPLACE:-false}
      - XFWM_RESTART_COOLDOWN=${XFWM_RESTART_COOLDOWN:-30}
      - XFWM_DISABLE_COMPOSITING=${XFWM_DISABLE_COMPOSITING:-true}
      - DISPLAY_NUM=${DISPLAY_NUM:-99}
      - SCREEN_RESOLUTION=${SCREEN_RESOLUTION:-1600x900}
      - SCREEN_DEPTH=${SCREEN_DEPTH:-24}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-compute,utility,graphics,display,video}
      - LD_LIBRARY_PATH=/usr/local/cuda/lib64:/usr/lib/x86_64-linux-gnu
      # - MODEL_PATH=/root/.cache/lm-studio/models/gemma-4-E4B-it-GGUF
      # - CONTEXT_LENGTH=32768
    volumes:
      # Use workspace entrypoint so hotfixes apply without rebuilding image.
      - ./entrypoint.sh:/app/entrypoint.sh:ro
      - ./data:/app/lm-studio
      - ./cache:/root/.cache/lm-studio
      - ./models:/root/.cache/lm-studio/models
      - ./guacamole:/app/guacamole-config
      # 映射 Vulkan ICD 配置文件
      - /usr/share/vulkan/icd.d/nvidia_icd.json:/usr/share/vulkan/icd.d/nvidia_icd.json:ro
      # 某些发行版不提供 /etc/vulkan/icd.d/nvidia_icd.json，复用 /usr/share 源文件挂到容器 /etc 路径
      - /usr/share/vulkan/icd.d/nvidia_icd.json:/etc/vulkan/icd.d/nvidia_icd.json:ro
      # 映射 EGL 配置文件 (用于 GLX)
      - /usr/share/glvnd/egl_vendor.d/10_nvidia.json:/usr/share/glvnd/egl_vendor.d/10_nvidia.json:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'pgrep -x x11vnc >/dev/null'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  guacd:
    image: guacamole/guacd:1.6.0
    container_name: guacd
    restart: unless-stopped

  guacamole:
    image: guacamole/guacamole:1.6.0
    container_name: guacamole
    depends_on:
      guacd:
        condition: service_started
      lmstudio:
        condition: service_healthy
    environment:
      - GUACD_HOSTNAME=${GUACD_HOSTNAME:-guacd}
      - GUACD_PORT=${GUACD_PORT:-4822}
      - WEBAPP_CONTEXT=${GUAC_WEBAPP_CONTEXT:-ROOT}
      - GUACAMOLE_HOME=/config/guacamole
      - GUAC_USERNAME=${GUAC_USERNAME:-lmstudio}
      - GUAC_PASSWORD=${GUAC_PASSWORD:-lmstudio}
      - "GUAC_CONN_NAME=${GUAC_CONN_NAME:-LM Studio Shared Desktop}"
      - GUAC_PROTOCOL=${GUAC_PROTOCOL:-vnc}
      - GUAC_TARGET_HOST=${GUAC_TARGET_HOST:-lmstudio}
      - GUAC_TARGET_PORT=${GUAC_TARGET_PORT:-5900}
      - GUAC_TARGET_PASSWORD=${GUAC_TARGET_PASSWORD:-lmstudio}
      - GUAC_AUTORETRY=${GUAC_AUTORETRY:-3}
      - GUAC_DISABLE_DISPLAY_RESIZE=${GUAC_DISABLE_DISPLAY_RESIZE:-false}
      - GUAC_COLOR_DEPTH=${GUAC_COLOR_DEPTH:-24}
      - GUAC_CURSOR=${GUAC_CURSOR:-remote}
      - GUAC_DISABLE_COPY=${GUAC_DISABLE_COPY:-false}
      - GUAC_DISABLE_PASTE=${GUAC_DISABLE_PASTE:-false}
      - GUAC_CLIPBOARD_ENCODING=${GUAC_CLIPBOARD_ENCODING:-UTF-8}
    volumes:
      - ./guacamole:/config/guacamole:ro
    restart: unless-stopped

  guacweb:
    image: nginx:1.27-alpine
    container_name: guacweb
    depends_on:
      guacamole:
        condition: service_started
      lmstudio:
        condition: service_healthy
    environment:
      - GUAC_WEB_PORT=${GUAC_WEB_PORT:-8888}
      - GUAC_WEB_HTTPS_ENABLE=${GUAC_WEB_HTTPS_ENABLE:-false}
      - LMS_API_HTTPS_ENABLE=${LMS_API_HTTPS_ENABLE:-false}
      - GUAC_WEB_HTTPS_VERIFY_CERT=${GUAC_WEB_HTTPS_VERIFY_CERT:-false}
      - GUAC_WEB_CERT_FILE=${GUAC_WEB_CERT_FILE:-localhost.crt}
      - GUAC_WEB_KEY_FILE=${GUAC_WEB_KEY_FILE:-localhost.key}
      - LMS_API_HTTPS_VERIFY_CERT=${LMS_API_HTTPS_VERIFY_CERT:-}
      - LMS_API_CERT_FILE=${LMS_API_CERT_FILE:-}
      - LMS_API_KEY_FILE=${LMS_API_KEY_FILE:-}
      - CLIPBOARD_BRIDGE_PORT=${CLIPBOARD_BRIDGE_PORT:-18080}
    ports:
      - "${GUAC_WEB_PORT:-8888}:${GUAC_WEB_PORT:-8888}"
      - "${LMS_API_PORT:-1234}:1234"
    volumes:
      - ./guac-proxy/50-setup-nginx.sh:/docker-entrypoint.d/50-setup-nginx.sh:ro
      - ./guac-proxy/clipboard-bridge.js:/usr/share/nginx/html/clipboard-bridge.js:ro
      - ./cert:/etc/nginx/certs
    command: ["/bin/sh", "-c", "apk add --no-cache openssl >/dev/null 2>&1 || true; sh /docker-entrypoint.d/50-setup-nginx.sh && exec nginx -g 'daemon off;'"]
    restart: unless-stopped