events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8080;
        server_name _;

        client_max_body_size 2m;

        location = /clipboard-bridge.js {
            root /etc/nginx/html;
            add_header Cache-Control "no-store" always;
        }

        location /__clipboard_bridge/ {
            proxy_pass http://lmstudio:18080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control "no-store" always;
        }

        location / {
            proxy_pass http://guacamole:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Accept-Encoding "";
            sub_filter_once on;
            sub_filter_types text/html application/xhtml+xml;
            sub_filter '</body>' '<script src="/clipboard-bridge.js?v=20260519b"></script></body>';
            sub_filter '</BODY>' '<script src="/clipboard-bridge.js?v=20260519b"></script></BODY>';
        }
    }
}
